name: Validate Plugins

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  validate-structure:
    name: Validate Repository Structure
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate Claude Code manifests
        run: |
          echo "Validating Claude Code manifests..."
          jq empty .claude-plugin/marketplace.json
          jq empty .claude-plugin/plugin.json
          echo "✓ Claude Code JSON manifests are valid"

      - name: Validate Codex manifests
        run: |
          echo "Validating Codex manifests..."
          jq empty .agents/plugins/marketplace.json
          jq empty .codex-plugin/plugin.json
          echo "✓ Codex JSON manifests are valid"

      - name: Check required Claude Code marketplace fields
        run: |
          echo "Checking required Claude Code marketplace fields..."

          for field in name owner plugins; do
            if ! jq -e ".$field" .claude-plugin/marketplace.json > /dev/null; then
              echo "✗ Missing required field: $field"
              exit 1
            fi
            echo "✓ Field '$field' present"
          done

          if ! jq -e ".owner.name" .claude-plugin/marketplace.json > /dev/null; then
            echo "✗ Missing required field: owner.name"
            exit 1
          fi
          echo "✓ Field 'owner.name' present"

          if ! jq -e ".plugins | type == \"array\"" .claude-plugin/marketplace.json > /dev/null; then
            echo "✗ Field 'plugins' must be an array"
            exit 1
          fi
          echo "✓ Field 'plugins' is an array"

      - name: Check required Codex marketplace fields
        run: |
          echo "Checking required Codex marketplace fields..."

          for field in name plugins; do
            if ! jq -e ".$field" .agents/plugins/marketplace.json > /dev/null; then
              echo "✗ Missing required field: $field"
              exit 1
            fi
            echo "✓ Field '$field' present"
          done

          if ! jq -e ".plugins | type == \"array\"" .agents/plugins/marketplace.json > /dev/null; then
            echo "✗ Field 'plugins' must be an array"
            exit 1
          fi
          echo "✓ Field 'plugins' is an array"

          if ! jq -e '.plugins[] | select(.name == "xyo-skills") | .source.source == "local" and .source.path == "./" and .policy.installation and .policy.authentication and .category' .agents/plugins/marketplace.json > /dev/null; then
            echo "✗ Codex marketplace entry for xyo-skills is incomplete or does not point at './'"
            exit 1
          fi
          echo "✓ Codex marketplace entry is complete"

  validate-plugins:
    name: Validate Individual Plugins
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate Claude Code plugins
        run: |
          echo "Validating Claude Code plugin files..."

          plugins=$(jq -r '.plugins[] | select(.source | type == "string") | .source' .claude-plugin/marketplace.json)

          for plugin_path in $plugins; do
            plugin_name=$(basename "$plugin_path")
            echo ""
            echo "Checking Claude Code plugin: $plugin_name"
            echo "================================"

            if [ ! -d "$plugin_path" ]; then
              echo "✗ Directory not found: $plugin_path"
              exit 1
            fi
            echo "✓ Directory exists"

            plugin_json="$plugin_path/.claude-plugin/plugin.json"
            if [ ! -f "$plugin_json" ]; then
              echo "✗ plugin.json not found at $plugin_json"
              exit 1
            fi
            echo "✓ plugin.json exists"

            if ! jq empty "$plugin_json" 2>/dev/null; then
              echo "✗ Invalid JSON in $plugin_json"
              exit 1
            fi
            echo "✓ plugin.json is valid JSON"

            if ! jq -e ".name" "$plugin_json" > /dev/null; then
              echo "✗ Missing required field: name"
              exit 1
            fi
            echo "✓ Required field 'name' present"

            if [ ! -f "$plugin_path/README.md" ]; then
              echo "⚠️  Warning: README.md not found (recommended)"
            else
              echo "✓ README.md exists"
            fi

            if [ -d "$plugin_path/skills" ]; then
              echo "✓ Skills directory exists"
              skill_count=$(find "$plugin_path/skills" -name "SKILL.md" | wc -l | tr -d ' ')
              echo "  Found $skill_count skill(s)"
            fi

            echo "✓ Claude Code plugin $plugin_name is valid"
          done

          echo ""
          echo "✅ All Claude Code plugins validated successfully!"

      - name: Validate Codex plugin
        run: |
          echo "Validating Codex plugin: xyo-skills"
          echo "================================"

          codex_plugin_json=".codex-plugin/plugin.json"
          if [ ! -f "$codex_plugin_json" ]; then
            echo "✗ Codex plugin.json not found at $codex_plugin_json"
            exit 1
          fi
          echo "✓ Codex plugin.json exists"

          if ! jq empty "$codex_plugin_json" 2>/dev/null; then
            echo "✗ Invalid JSON in $codex_plugin_json"
            exit 1
          fi
          echo "✓ Codex plugin.json is valid JSON"

          for field in name version description author.name skills interface.displayName interface.shortDescription interface.longDescription interface.developerName interface.category interface.defaultPrompt; do
            if ! jq -e ".$field" "$codex_plugin_json" > /dev/null; then
              echo "✗ Missing required Codex plugin field: $field"
              exit 1
            fi
            echo "✓ Codex plugin field '$field' present"
          done

          if ! jq -e '.skills == "./skills/" or .skills == "./skills"' "$codex_plugin_json" > /dev/null; then
            echo "✗ Codex plugin skills path must point at ./skills/"
            exit 1
          fi
          echo "✓ Codex plugin skills path points at ./skills/"

          echo ""
          echo "✅ Codex plugin validated successfully!"

  validate-scaffold-sync:
    name: Verify scaffold bin/ is in sync with source
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          # Reads engines.node from the root package.json so CI tracks the
          # version requirement automatically — bump engines and CI follows.
          node-version-file: "package.json"

      - name: Enable corepack
        run: corepack enable

      - name: Install workspace deps
        run: corepack pnpm@10 install --frozen-lockfile

      - name: Build scaffold (mirrors into skills/xl1-scaffold/scripts/scaffold/)
        run: corepack pnpm@10 -w run build

      - name: Run scaffold tests
        run: corepack pnpm@10 --filter @xyo-network/xl1-scaffold run test

      - name: Fail if scaffold runtime drifted from source
        run: |
          SYNC_PATH=skills/xl1-scaffold/scripts/scaffold
          if ! git diff --exit-code "$SYNC_PATH"; then
            echo ""
            echo "✗ $SYNC_PATH is out of sync with packages/xl1-scaffold/."
            echo "  Run 'pnpm -w run build' locally and commit the changes."
            exit 1
          fi
          echo "✓ Scaffold runtime is in sync"

  check-duplicates:
    name: Check for Duplicate Plugin Names
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check Claude Code marketplace for duplicate plugin names
        run: |
          echo "Checking Claude Code marketplace for duplicate plugin names..."

          duplicates=$(jq -r '.plugins[].name' .claude-plugin/marketplace.json | sort | uniq -d)

          if [ -n "$duplicates" ]; then
            echo "✗ Duplicate Claude Code plugin names found:"
            echo "$duplicates"
            exit 1
          fi

          echo "✓ No duplicate Claude Code plugin names"

      - name: Check Codex marketplace for duplicate plugin names
        run: |
          echo "Checking Codex marketplace for duplicate plugin names..."

          duplicates=$(jq -r '.plugins[].name' .agents/plugins/marketplace.json | sort | uniq -d)

          if [ -n "$duplicates" ]; then
            echo "✗ Duplicate Codex plugin names found:"
            echo "$duplicates"
            exit 1
          fi

          echo "✓ No duplicate Codex plugin names"
