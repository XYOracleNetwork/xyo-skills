name: Validate Plugins

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  validate-renderers:
    name: Render & validate marketplace manifests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: package.json

      - name: Render Claude marketplace tree
        run: node scripts/marketplace-sync/build-claude.mjs --out /tmp/render/claude

      - name: Render Codex marketplace tree
        run: node scripts/marketplace-sync/build-codex.mjs --out /tmp/render/codex

      - name: Validate Claude marketplace manifest
        run: |
          set -euo pipefail
          jq empty /tmp/render/claude/.claude-plugin/marketplace.json
          jq empty /tmp/render/claude/.claude-plugin/plugin.json
          jq -e '.name and .owner.name and (.plugins | type == "array")' /tmp/render/claude/.claude-plugin/marketplace.json > /dev/null
          jq -e '.name and .version' /tmp/render/claude/.claude-plugin/plugin.json > /dev/null
          echo "✓ Claude manifests valid"

      - name: Validate Codex marketplace manifest
        run: |
          set -euo pipefail
          jq empty /tmp/render/codex/.agents/plugins/marketplace.json
          jq empty /tmp/render/codex/plugins/xyo-skills/.codex-plugin/plugin.json
          jq -e '.name and (.plugins | type == "array") and (.plugins[] | select(.name == "xyo-skills") | .source.source == "local" and .source.path == "./plugins/xyo-skills" and .policy.installation and .policy.authentication and .category)' /tmp/render/codex/.agents/plugins/marketplace.json > /dev/null
          for field in name version description author.name skills interface.displayName interface.shortDescription interface.longDescription interface.developerName interface.category interface.defaultPrompt; do
            jq -e ".$field" /tmp/render/codex/plugins/xyo-skills/.codex-plugin/plugin.json > /dev/null || { echo "✗ Missing Codex plugin field: $field"; exit 1; }
          done
          echo "✓ Codex manifests valid"

      - name: Validate rendered tree shape
        run: |
          set -euo pipefail
          for path in skills assets LICENSE; do
            test -e "/tmp/render/claude/$path" || { echo "✗ claude missing $path"; exit 1; }
          done
          test -e /tmp/render/codex/LICENSE || { echo "✗ codex missing LICENSE"; exit 1; }
          for path in skills assets; do
            test -e "/tmp/render/codex/plugins/xyo-skills/$path" || { echo "✗ codex missing plugins/xyo-skills/$path"; exit 1; }
          done
          echo "✓ Rendered trees include expected static content"

  validate-scaffold-sync:
    name: Verify scaffold bin/ is in sync with source
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          # Reads engines.node from the root package.json so CI tracks the
          # version requirement automatically — bump engines and CI follows.
          node-version-file: "package.json"

      - name: Enable corepack
        run: corepack enable

      - name: Install workspace deps
        run: corepack pnpm@10 install --frozen-lockfile

      - name: Build scaffold (mirrors into skills/xl1-scaffold/scripts/scaffold/)
        run: corepack pnpm@10 -w run build

      - name: Run scaffold tests
        run: corepack pnpm@10 --filter @xyo-network/xl1-scaffold run test

      - name: Fail if scaffold runtime drifted from source
        run: |
          SYNC_PATH=skills/xl1-scaffold/scripts/scaffold
          if ! git diff --exit-code "$SYNC_PATH"; then
            echo ""
            echo "✗ $SYNC_PATH is out of sync with packages/xl1-scaffold/."
            echo "  Run 'pnpm -w run build' locally and commit the changes."
            exit 1
          fi
          echo "✓ Scaffold runtime is in sync"
