name: Lint PR Title

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]
    branches: [main]

permissions:
  pull-requests: read

jobs:
  lint-pr-title:
    name: Require conventional title (feat/fix)
    runs-on: ubuntu-latest
    steps:
      - name: Skip for release-please PRs
        if: ${{ startsWith(github.event.pull_request.head.ref, 'release-please--') }}
        run: echo "PR head is a release-please branch — skipping conventional-title check."
      - uses: amannn/action-semantic-pull-request@v5
        if: ${{ !startsWith(github.event.pull_request.head.ref, 'release-please--') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
          requireScope: false
          subjectPattern: ^[A-Za-z].+$
          subjectPatternError: |
            The PR title subject must start with a letter and be at least
            two characters long. Example: `fix: roll up develop`.
