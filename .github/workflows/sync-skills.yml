# Sync `skills/` to the public `XYOracleNetwork/xyo-skills`
# mirror so the skills are installable via `npx skills add
# XYOracleNetwork/xyo-skills` (skills.sh CLI).
#
# Multi-source safe: each source repo claims its skills via a manifest at
# `<target>/.sync-manifests/<source-name>.json`. Per-skill rsync ensures one
# source can't clobber another, and a collision check fails the workflow if
# this source tries to publish a name another source already owns.
#
# Auth: requires repo secret `PUBLIC_REPO_SYNC_TOKEN` — a fine-grained PAT
# scoped to ONLY `XYOracleNetwork/xyo-skills` with `Contents: Read and
# write`. See docs/sync-setup.md for provisioning, rotation, and onboarding
# additional source repos.

name: Sync skills to xyo-skills

on:
  push:
    branches: [main]
    paths:
      - 'skills/**'
      - 'scripts/validate-skills.mjs'
      - 'scripts/sync-skills.sh'
      - '.github/workflows/sync-skills.yml'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Validate + compute diff but skip the push'
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: sync-skills
  cancel-in-progress: false

env:
  TARGET_REPO: XYOracleNetwork/xyo-skills
  SOURCE_DIR: skills
  SOURCE_NAME: xl1-skills

jobs:
  sync:
    name: Validate and mirror
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Validate skills
        run: node scripts/validate-skills.mjs "$SOURCE_DIR"

      - name: Clone target repo
        env:
          PAT: ${{ secrets.PUBLIC_REPO_SYNC_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -z "${PAT}" ]]; then
            echo "::error::PUBLIC_REPO_SYNC_TOKEN secret is not set. See docs/sync-setup.md."
            exit 1
          fi
          git clone --depth 1 "https://x-access-token:${PAT}@github.com/${TARGET_REPO}.git" target-mirror

      - name: Run manifest-driven sync
        env:
          TARGET_DIR: target-mirror
          GITHUB_SHA: ${{ github.sha }}
        run: bash scripts/sync-skills.sh

      - name: Stage and detect changes
        id: diff
        working-directory: target-mirror
        run: |
          set -euo pipefail
          git add -A skills/ .sync-manifests/
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No changes to sync."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Staged diff against target HEAD:"
            git diff --cached --stat
          fi

      - name: Dry-run summary
        if: steps.diff.outputs.changed == 'true' && inputs.dry_run == true
        run: echo "::notice::dry_run=true — staged diff above would be pushed to ${TARGET_REPO}, but skipping."

      - name: Commit and push
        if: steps.diff.outputs.changed == 'true' && inputs.dry_run != true
        working-directory: target-mirror
        env:
          GITHUB_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          git -c user.name='github-actions[bot]' \
              -c user.email='41898282+github-actions[bot]@users.noreply.github.com' \
              -c commit.gpgsign=false \
              commit -m "chore: sync skills from xl1-skills@${GITHUB_SHA}"
          git push origin HEAD
